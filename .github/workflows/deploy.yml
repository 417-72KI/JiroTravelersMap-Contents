name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build_and_validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            containers/validate/.build/artifacts
            containers/validate/.build/checkouts
            containers/validate/.build/repositories
          key: ${{ runner.os }}-swift-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-
            ${{ runner.os }}-
      - name: build yml
        run: docker compose run --rm build
      - name: validate yml
        run: docker compose run --rm validate
      - name: upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: public
          path: public
  deploy:
    needs: build_and_validate
    runs-on: ubuntu-latest
    env:
      GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Decode credentials
      env:
        GCLOUD_SERVICE_KEY: ${{ secrets.GCLOUD_SERVICE_KEY }}
      run: echo $GCLOUD_SERVICE_KEY | base64 -d > $GOOGLE_APPLICATION_CREDENTIALS
    - name: download artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: public
        path: public
    - name: Set up firebase-tools
      run: npm install -g firebase-tools
    - name: Validate contents
      if: github.ref != 'refs/heads/main'
      run: |
        git status --ignored
        ls -Rl .
    - name: Deploy to Firebase
      if: github.ref == 'refs/heads/main'
      run: firebase deploy --only hosting
    - name: Cleanup
      run: rm $GOOGLE_APPLICATION_CREDENTIALS

name: Validate
on:
  pull_request: {}
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: build json from yml
        run: docker compose run --rm build
      - name: validate json
        run: docker compose run --rm validate

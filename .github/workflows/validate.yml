name: Validate
on:
  pull_request: {}
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: build json from yml
        run: docker compose run --rm build
      - name: validate json
        run: docker compose run --rm validate

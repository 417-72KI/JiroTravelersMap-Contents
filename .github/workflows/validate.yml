name: Validate
on:
  pull_request: {}
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: build json from yml
        run: docker compose run --rm build
      - name: validate json
        run: docker compose run --rm validate

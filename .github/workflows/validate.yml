name: Validate
on:
  pull_request: {}
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: build json from yml
        run: docker compose run --rm build
      - name: validate json
        run: docker compose run --rm validate
